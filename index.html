<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="動画を見る">
  <meta property="og:description" content="タップして動画を見る ▶">
  <meta property="og:image" content="https://pikachuhtt48-boop.github.io/redirect/ogp.png">
  <meta property="og:url" content="https://pikachuhtt48-boop.github.io/redirect/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://pikachuhtt48-boop.github.io/redirect/ogp.png">
  <meta name="twitter:title" content="動画を見る">
  <meta name="twitter:description" content="タップして動画を見る ▶">
  <title>動画を見る</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    .play {
      width: 80px;
      height: 80px;
      border: 3px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play::after {
      content: '';
      width: 0;
      height: 0;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-left: 30px solid #fff;
      margin-left: 6px;
    }
    #tap-link {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-decoration: none;
      color: #fff;
      background: #000;
    }
    .label {
      font-size: 14px;
      color: #555;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <a id="tap-link" href="#">
    <div class="play"></div>
    <span class="label">タップして開く</span>
  </a>

  <script>
    fetch('https://raw.githubusercontent.com/pikachuhtt48-boop/redirect/main/config.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d || !d.url) return;
        var url = d.url;
        var link = document.getElementById("tap-link");
        link.href = url;

        link.click();
      })
      .catch(function() {});
  </script>
</body>
</html>
