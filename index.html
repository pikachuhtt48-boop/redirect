<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta property="og:title" content="動画を見る">
  <meta property="og:description" content="タップして動画を見る ▶">
  <meta property="og:image" content="https://pikachuhtt48-boop.github.io/redirect/ogp.png">
  <meta property="og:url" content="https://pikachuhtt48-boop.github.io/redirect/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://pikachuhtt48-boop.github.io/redirect/ogp.png">
  <meta name="twitter:title" content="動画を見る">
  <meta name="twitter:description" content="タップして動画を見る ▶">
  <title>動画を見る</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    #tap-area {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .play {
      width: 90px;
      height: 90px;
      border: 3px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.8s ease-in-out infinite;
    }
    .play::after {
      content: '';
      width: 0; height: 0;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-left: 34px solid #fff;
      margin-left: 8px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.93); }
    }
    .label {
      font-family: -apple-system, sans-serif;
      font-size: 15px;
      color: #555;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div id="tap-area">
    <div class="play"></div>
    <span class="label">タップして視聴する</span>
  </div>

  <a id="hidden-link" href="#" style="display:none;"></a>

  <script>
    var destUrl = '';

    fetch('https://raw.githubusercontent.com/pikachuhtt48-boop/redirect/main/config.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.url) destUrl = d.url;
      })
      .catch(function() {});

    document.getElementById('tap-area').addEventListener('click', function() {
      if (!destUrl) return;
      var link = document.getElementById('hidden-link');
      link.href = destUrl;
      link.click();
    });
  </script>
</body>
</html>
