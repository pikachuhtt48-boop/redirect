<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }
    .header h1 { font-size: 16px; font-weight: 500; color: #aaa; letter-spacing: 0.05em; }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    textarea, input[type="password"], input[type="text"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: -apple-system, sans-serif;
      padding: 12px;
      outline: none;
      resize: none;
      line-height: 1.5;
    }
    textarea { height: 110px; }
    textarea:focus, input:focus { border-color: #444; }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 10px;
      letter-spacing: 0.02em;
    }
    .btn:active { opacity: 0.7; }
    .btn-white { background: #fff; color: #000; }
    .btn-gray { background: #1e1e1e; color: #aaa; border: 1px solid #2a2a2a; }
    .btn-red { background: #1a0a0a; color: #ef4444; border: 1px solid #2a1010; }
    .share-url {
      font-size: 13px; color: #666;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 10px 12px;
      word-break: break-all;
      line-height: 1.6;
    }
    .msg { font-size: 13px; color: #22c55e; min-height: 20px; margin-top: 8px; text-align: center; }
    .msg.err { color: #ef4444; }
    .status-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
      padding: 3px 10px; border-radius: 20px;
      background: #1a2e1a; color: #22c55e; border: 1px solid #1e3a1e;
      display: inline-block; margin-bottom: 12px;
    }
    .current-url { font-size: 12px; color: #444; margin-top: 8px; word-break: break-all; line-height: 1.5; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #333; border-top-color: #000;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 12px; color: #444; margin-top: 6px; line-height: 1.5; }
    #setup-view, #admin-view { display: none; }
    .logout { text-align: center; margin-top: 1.5rem; font-size: 13px; color: #444; cursor: pointer; padding: 8px; }
  </style>
</head>
<body>

<div id="setup-view">
  <div class="header">
    <div class="dot" style="background:#555;"></div>
    <h1>初期設定</h1>
  </div>
  <div class="card">
    <div class="card-label">管理パスワード（自分で決める）</div>
    <input type="password" id="setup-pass" placeholder="好きなパスワードを入力" />
    <div class="card-label" style="margin-top:1rem;">GitHub Personal Access Token</div>
    <input type="password" id="setup-token" placeholder="ghp_から始まるトークン" />
    <p class="hint">このスマホのブラウザにのみ保存されます。GitHubには送信されません。</p>
    <button class="btn btn-white" onclick="doSetup()">設定を保存する</button>
    <p id="setup-msg" class="msg err"></p>
  </div>
</div>

<div id="admin-view">
  <div class="header">
    <div class="dot"></div>
    <h1>REDIRECT ADMIN</h1>
  </div>

  <div class="card">
    <span class="status-badge">LIVE</span>
    <div class="card-label">新しいTikTok招待URL</div>
    <textarea id="redirect-url" placeholder="https://lite.tiktok.com/...&#10;または1linkで取得した長いURL"></textarea>
    <button class="btn btn-white" id="save-btn" onclick="saveUrl()">保存して更新</button>
    <p id="save-msg" class="msg"></p>
    <p class="current-url" id="current-url"></p>
  </div>

  <div class="card">
    <div class="card-label">Xに貼るURL（変わらない）</div>
    <div class="share-url">https://pikachuhtt48-boop.github.io/redirect/</div>
    <button class="btn btn-gray" onclick="copyShareUrl()">URLをコピー</button>
    <p id="copy-msg" class="msg"></p>
  </div>

  <div class="card">
    <div class="card-label" style="color:#333;">危険な操作</div>
    <button class="btn btn-red" onclick="resetAll()">設定をリセット（ログアウト）</button>
  </div>
</div>

<script>
  var REPO = "pikachuhtt48-boop/redirect";
  var FILE = "config.json";

  function getToken() { return localStorage.getItem("gh_token") || ""; }
  function getPass() { return localStorage.getItem("adm_pass") || ""; }

  function init() {
    var hasSetup = getToken() && getPass();
    if (!hasSetup) {
      document.getElementById("setup-view").style.display = "block";
      document.getElementById("admin-view").style.display = "none";
      return;
    }
    var authed = sessionStorage.getItem("adm_ok") === "1";
    if (!authed) {
      var pw = prompt("パスワードを入力してください");
      if (pw === getPass()) {
        sessionStorage.setItem("adm_ok", "1");
      } else {
        document.body.innerHTML = '<p style="color:#555;padding:2rem;font-size:14px;">パスワードが違います。ページを再読み込みしてください。</p>';
        return;
      }
    }
    document.getElementById("setup-view").style.display = "none";
    document.getElementById("admin-view").style.display = "block";
    loadCurrentUrl();
  }

  function doSetup() {
    var pass = document.getElementById("setup-pass").value.trim();
    var token = document.getElementById("setup-token").value.trim();
    if (!pass || !token) {
      setMsg("setup-msg", "両方入力してください", true); return;
    }
    if (!token.startsWith("ghp_") && !token.startsWith("github_pat_")) {
      setMsg("setup-msg", "トークンの形式が正しくありません", true); return;
    }
    localStorage.setItem("adm_pass", pass);
    localStorage.setItem("gh_token", token);
    sessionStorage.setItem("adm_ok", "1");
    init();
  }

  function loadCurrentUrl() {
    fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE, {
      headers: { 'Authorization': 'token ' + getToken() }
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.content) {
        try {
          var json = JSON.parse(atob(d.content.replace(/\n/g, '')));
          if (json.url) document.getElementById("current-url").textContent = "現在: " + json.url;
        } catch(e) {}
      }
    })
    .catch(function() {});
  }

  function saveUrl() {
    var url = document.getElementById("redirect-url").value.trim();
    if (!url) { setMsg("save-msg", "URLを入力してください", true); return; }

    var btn = document.getElementById("save-btn");
    btn.innerHTML = '<span class="spinner"></span>更新中...';
    btn.disabled = true;

    fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE, {
      headers: { 'Authorization': 'token ' + getToken() }
    })
    .then(function(r) { return r.json(); })
    .then(function(existing) {
      var content = btoa(JSON.stringify({ url: url }));
      var body = { message: "Update redirect URL", content: content };
      if (existing.sha) body.sha = existing.sha;
      return fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE, {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + getToken(),
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      btn.innerHTML = '保存して更新';
      btn.disabled = false;
      if (d.content) {
        setMsg("save-msg", "更新しました！");
        document.getElementById("current-url").textContent = "現在: " + url;
        document.getElementById("redirect-url").value = "";
      } else {
        setMsg("save-msg", "エラーが発生しました", true);
      }
    })
    .catch(function() {
      btn.innerHTML = '保存して更新';
      btn.disabled = false;
      setMsg("save-msg", "エラーが発生しました", true);
    });
  }

  function copyShareUrl() {
    navigator.clipboard.writeText("https://pikachuhtt48-boop.github.io/redirect/").then(function() {
      setMsg("copy-msg", "コピーしました！");
    });
  }

  function resetAll() {
    if (confirm("設定をリセットしますか？")) {
      localStorage.removeItem("gh_token");
      localStorage.removeItem("adm_pass");
      sessionStorage.removeItem("adm_ok");
      location.reload();
    }
  }

  function setMsg(id, text, isErr) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = isErr ? "msg err" : "msg";
    setTimeout(function() { el.textContent = ""; }, 3000);
  }

  init();
</script>
</body>
</html>
